# NOTE: All database and backend service images below support native linux/arm64.
# Rosetta 2 emulation is NOT required on Apple Silicon.
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: voice_agent_qdrant_v2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage_v2:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      test: ["CMD", "sh", "-c", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: voice_agent_redis_v2
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_v2:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: voice_agent_mongodb_v2
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_v2:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:4.1
    container_name: voice_agent_cassandra_v2
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10

  session-context-service:
    build: .
    command: ["./session-context-service"]
    ports:
      - "9087:9087"
    environment:
      - REDIS_ADDR=voice_agent_redis_v2:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9087/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  llm-inference-service:
    build: .
    command: ["./llm-inference-service"]
    ports:
      - "9091:9091"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - CHAT_MODEL=qwen2.5:7b-instruct
      - EMBED_MODEL=bge-m3
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  semantic-cache-service:
    build: .
    command: ["./semantic-cache-service"]
    ports:
      - "9089:9089"
    environment:
      - QDRANT_URL=http://voice_agent_qdrant_v2:6333
      - INFERENCE_SERVICE_URL=http://llm-inference-service:9091
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
      llm-inference-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9089/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  tool-execution-service:
    build: .
    command: ["./tool-execution-service"]
    ports:
      - "9088:9088"
    environment:
      - MONGO_URI=mongodb://voice_agent_mongodb_v2:27017
      - REDIS_ADDR=voice_agent_redis_v2:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9088/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  conversation-history-consumer:
    build: .
    command: ["./conversation-history-consumer"]
    ports:
      - "9085:9085"
    environment:
      - REDIS_ADDR=voice_agent_redis_v2:6379
      - CASSANDRA_HOSTS=cassandra
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9085/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  audit-log-consumer:
    build: .
    command: ["./audit-log-consumer"]
    ports:
      - "9086:9086"
    environment:
      - REDIS_ADDR=voice_agent_redis_v2:6379
      - CASSANDRA_HOSTS=cassandra
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9086/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  llm-micro-orchestrator:
    build: .
    command: ["./llm-micro-orchestrator"]
    ports:
      - "9083-9085:9083"
    environment:
      - REDIS_ADDR=voice_agent_redis_v2:6379
      - CONTEXT_SERVICE_URL=http://session-context-service:9087
      - CACHE_SERVICE_URL=http://semantic-cache-service:9089
      - INFERENCE_SERVICE_URL=http://llm-inference-service:9091
      - TOOL_SERVICE_URL=http://tool-execution-service:9088
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      session-context-service:
        condition: service_healthy
      semantic-cache-service:
        condition: service_healthy
      llm-inference-service:
        condition: service_healthy
      tool-execution-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9083/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 3

  media-engine:
    build: .
    command: ["./media-engine"]
    environment:
      - ORCHESTRATOR_URL=http://llm-micro-orchestrator:9083
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
      - OTEL_LOGS_EXPORTER=otlp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      llm-micro-orchestrator:
        condition: service_healthy
      livekit:
         condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 3

  livekit:
    image: livekit/livekit-server:latest
    container_name: voice_agent_livekit_v2
    command: --dev --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7880"]
      interval: 5s
      timeout: 3s
      retries: 5

  lb:
    image: nginx:alpine
    container_name: voice_agent_lb_v2
    ports:
      - "9090:9090"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - media-engine

volumes:
  qdrant_storage_v2:
  redis_data_v2:
  mongodb_data_v2:
