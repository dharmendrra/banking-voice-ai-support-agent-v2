# NOTE: All database and backend service images below support native linux/arm64.
# Rosetta 2 emulation is NOT required on Apple Silicon.
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: voice_agent_qdrant_v2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage_v2:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      test: ["CMD", "sh", "-c", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: voice_agent_redis_v2
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_v2:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: voice_agent_mongodb_v2
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_v2:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:4.1
    container_name: voice_agent_cassandra_v2
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10

  llm-orchestrator-server:
    build: .
    command: ["./llm-orchestrator-server"]
    environment:
      - MONGO_URI=mongodb://voice_agent_mongodb_v2:27017
      - REDIS_ADDR=voice_agent_redis_v2:6379
      - QDRANT_URL=http://voice_agent_qdrant_v2:6333
      - CASSANDRA_HOSTS=cassandra
      - OLLAMA_URL=http://host.docker.internal:11434
      - CHAT_MODEL=gemma4:e4b
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
      - OTEL_LOGS_EXPORTER=otlp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    deploy:
      replicas: 3

  media-engine:
    build: .
    command: ["./media-engine"]
    environment:
      - ORCHESTRATOR_URL=http://llm-orchestrator-server:9083
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
      - OTEL_LOGS_EXPORTER=otlp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      llm-orchestrator-server:
        condition: service_started
      livekit:
        condition: service_healthy
    deploy:
      replicas: 3

  livekit:
    image: livekit/livekit-server:latest
    container_name: voice_agent_livekit_v2
    command: --dev --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7880"]
      interval: 5s
      timeout: 3s
      retries: 5

#   kokoro-tts:
#     image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
#     container_name: voice_agent_kokoro_v2
#     ports:
#       - "8880:8880"
#     healthcheck:
#       test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8880/docs')"]
#       interval: 5s
#       timeout: 3s
#       retries: 5

  lb:
    image: nginx:alpine
    container_name: voice_agent_lb_v2
    ports:
      - "9090:9090"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - media-engine

volumes:
  qdrant_storage_v2:
  redis_data_v2:
  mongodb_data_v2:
