events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS resolver (IPv4 only)
    resolver 127.0.0.11 ipv6=off valid=5s;

    server {
        listen 9090 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location = /favicon.ico {
            log_not_found off;
            access_log off;
            return 204;
        }

        location /v1/audio/speech {
            # Use variable to resolve dynamically
            set $tts_upstream http://host.docker.internal:8880;
            proxy_pass $tts_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /orchestrator/ {
            rewrite ^/orchestrator/(.*) /$1 break;
            proxy_pass http://llm-micro-orchestrator:9083;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
        }

        location / {
            # Use variable to resolve media-engine dynamically at runtime
            set $media_engine_upstream http://media-engine:9082;
            proxy_pass $media_engine_upstream;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Disable buffering for WebSockets
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
