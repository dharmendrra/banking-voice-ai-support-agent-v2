events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS resolver (IPv4 only)
    resolver 127.0.0.11 ipv6=off valid=5s;

    server {
        listen 9090;

        location = /favicon.ico {
            log_not_found off;
            access_log off;
            return 204;
        }

        location /v1/audio/speech {
            # Use variable to resolve dynamically
            set $tts_upstream http://host.docker.internal:8880;
            proxy_pass $tts_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location / {
            # Use variable to resolve media-engine dynamically at runtime
            set $media_engine_upstream http://media-engine:9082;
            proxy_pass $media_engine_upstream;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Disable buffering for WebSockets
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
